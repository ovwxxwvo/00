<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <!-- <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css"> -->
  <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-icons-font@10.1.0/font/simple-icons.min.css"> -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* ======================
       🔥 全部变量在这里！
       你只需要改这里就够了
       ====================== */
    :root {
      /* 搜索地址 */
      /* --search-url: https://www.baidu.com/s?wd=; */
      --search-url: https://www.bing.com/search?q=;

      /* 整体位置：整个三大块（logo + 搜索栏 + 快捷方式）的上下位置 */
      --page-top: 16vh;

      /* 元素之间的间距 */
      --space-logo-to-search:      8vh;
      --space-search-to-shortcuts: 4vh;

      /* 搜索栏宽度 */
      --search-height: 6vh;
      --search-width:  48vw;

      /* 快捷图标大小 */
      --shortcut-size:   4vw;
      --shortcut-radius: 1vw;
      --shortcut-gap:    4vw;

      /* 底部文字 */
      --footer-text:      "Hello World";
      --footer-font-size: 2vh;
      --footer-bottom:    4vh;

    }

    body {
      background: #f9f9fb;
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding-top: var(--page-top); /* 👈 用变量 */
      padding-left: 24px;
      padding-right: 24px;
    }

    .container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-logo-to-search);
    }

    .firefox-icon {
      font-size: 72px;
      color: #ff6633;
    }

    .search-box {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .search-box input {
      height: var(--search-height);
      width:  var(--search-width);
      border-radius: 28px;
      border: none;
      outline: none;
      padding: 0 24px 0 24px;
      font-size: 17px;
      background: #fff;
      box-shadow: 0 1px 5px rgba(0,0,0,0.1);
    }

    .search-box i {
      position: absolute;
      left: 20px;
      top: 19px;
      font-size: 18px;
      color: #666;
    }

    .shortcuts {
      display: flex;
      justify-content: center;
      gap: var(--shortcut-gap);
      flex-wrap: wrap;
      margin-top: var(--space-search-to-shortcuts); /* 👈 搜索框 ↔ 图标 */
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #222;
      font-size: 14px;
      font-weight: 500;
    }

    .shortcut .icon {
      width: var(--shortcut-size);
      height: var(--shortcut-size);
      border-radius: var(--shortcut-radius);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .shortcut:hover .icon {
      background: #eee;
    }

    .footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: var(--footer-bottom);
      text-align: center;
      font-size: var(--footer-font-size);
      color: #666;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- <i class="fa-brands fa-firefox-browser firefox-icon"></i> -->
    <img
      class="firefox-icon"
      src="https://www.firefox.com/media/img/logos/firefox/firefox-logo.b030cd103a84.svg"
      alt="Firefox"
      style="width:72px; height:72px; color:#ff6633; fill:currentColor;"
    >

    <div class="search-box">
      <input type="text" placeholder="Search the web ...">
    </div>

    <div class="shortcuts">
      <!-- <a class="shortcut" href="" target="_blank"> -->
      <!--   <div class="icon"> -->
      <!--     <img -->
      <!--       src="" -->
            <!-- style="width: 48px; height: 48px; object-fit: contain; border-radius: 12px;" -->
      <!--     > -->
      <!--   </div> -->
      <!--   <span></span> -->
      <!-- </a> -->

      <a class="shortcut" href="https://www.doubao.com/chat" target="_blank">
        <div class="icon">
          <img
            src="https://static.pc.yyb.qq.com/icon/7e9713caa6fc5e28f37d28ed1bdcb866.png?imageMogr2/format/webp"
            style="width: 48px; height: 48px; object-fit: contain; border-radius: 24px;"
          >
        </div>
        <span>DouBao</span>
      </a>

      <a class="shortcut" href="https://pan.baidu.com/disk/main" target="_blank">
        <div class="icon">
          <img
            src="https://static.pc.yyb.qq.com/icon/38e3d3e67901265b431204f4e6926d75.png?imageMogr2/format/webp"
            style="width: 48px; height: 48px; object-fit: contain; border-radius: 24px;"
          >
        </div>
        <span>BaiduDisk</span>
      </a>

      <a class="shortcut" href="https://www.alipan.com/drive/file/all" target="_blank">
        <div class="icon">
          <img
            src="https://static.pc.yyb.qq.com/icon/15de7e9b6b7eb225c6c75ed2a7c2680d.png?imageMogr2/format/webp"
            style="width: 48px; height: 48px; object-fit: contain; border-radius: 24px;"
          >
        </div>
        <span>AliDrive</span>
      </a>

      <a class="shortcut" href="https://wx.qq.com" target="_blank">
        <div class="icon">
          <img
            src="https://static.pc.yyb.qq.com/icon/33ba997259ea354c84509fb9cc3418e7.png?imageMogr2/format/webp"
            style="width: 48px; height: 48px; object-fit: contain; border-radius: 24px;"
          >
        </div>
        <span>WeChat</span>
      </a>

      <a class="shortcut" href="https://www.bilibili.com" target="_blank">
        <div class="icon">
          <img
            src="https://static.pc.yyb.qq.com/icon/a35d1928bee38ea4d4ea99447de9677a.png?imageMogr2/format/webp"
            style="width: 48px; height: 48px; object-fit: contain; border-radius: 24px;"
          >
        </div>
        <span>BiliBili</span>
      </a>

    </div>
  </div>

  <div class="footer">Hello World</div>

  <script>
    const searchInput = document.querySelector('.search-box input');

    searchInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        const keyword = this.value.trim();
        if (keyword) {
          // 从 CSS 变量里拿搜索地址
          const searchUrl = getComputedStyle(document.documentElement)
            .getPropertyValue('--search-url')
            .replace(/"/g, '')
            .trim();

          window.open(searchUrl + encodeURIComponent(keyword));
          this.value = '';
        }
      }
    });
  </script>
</body>
</html>
